title: Chao Peng Ji
first_name: Chao Peng
middle_name:
last_name: Ji
contact_note: >
  Email is the best way to reach me. Please update this note with your preferred contact route.
description: >
  Personal academic homepage for Chao Peng Ji: research, publications, projects, notes, and CV.
footer_text: >
  Built with <a href="https://github.com/alshedivat/al-folio">al-folio</a> and hosted on <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: academic-website, researcher, publications, projects, cv
lang: en
icon:
url: https://M1eraki.github.io
baseurl:
last_updated: false
back_to_top: true

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: false
external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

al_folio:
  api_version: 1
  style_engine: tailwind
  tailwind:
    version: 4.1.18
    preflight: false
    css_entry: assets/tailwind/app.css
  distill:
    engine: distillpub-template
    source: al-org-dev/distill-template#al-folio
    allow_remote_loader: true
  features:
    cv:
      enabled: true
    distill:
      enabled: true
  compat:
    bootstrap:
      enabled: false
  upgrade:
    channel: stable
    auto_apply_safe_fixes: false

navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: true
bib_search: true
max_width: 930px
serve_og_meta: false
serve_schema_org: false
og_image:

analytics:
  google:
  cronitor:
  pirsch:
  openpanel:
google_site_verification:
bing_site_verification:

blog_name: Notes
blog_description: Research notes, reading notes, and short technical essays.
permalink: /blog/:year/:title/
lsi: false
pagination:
  enabled: true
related_blog_posts:
  enabled: false

newsletter:
  enabled: false
  endpoint:
giscus:
  repo:
  repo_id:
  category: Comments
  category_id:
  mapping: title
  strict: 1
  reactions_enabled: 1
  input_position: bottom
  dark_theme: dark
  light_theme: light
  emit_metadata: 0
  lang: en
disqus_shortname:
external_sources: []

collections:
  books:
    output: true
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true
  teachings:
    output: true

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
  - .bundle
keep_files:
  - CNAME
  - .nojekyll

theme: al_folio_core
plugins:
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-terser
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji
  - al_folio_core
  - al_icons
  - al_folio_cv
  - al_folio_distill
  - al_folio_upgrade
  - al_folio_bootstrap_compat
  - al_cookie
  - al_analytics
  - al_citations
  - al_ext_posts
  - al_img_tools
  - al_search
  - al_charts
  - al_math
  - al_comments
  - al_newsletter

defaults:
  - scope:
      path: assets
    values:
      sitemap: false
sass:
  style: compressed

jekyll-minifier:
  compress_javascript: false
  compress_css: false
  exclude: ["robots.txt"]
terser:
  compress:
    drop_console: true
jekyll-archives:
  posts:
    enabled: [year, tags, categories]
    permalinks:
      year: /blog/:year/
      tags: /blog/:type/:name/
      categories: /blog/:type/:name/
  books:
    enabled: [year, tags, categories]
display_tags: [research, notes, tools, papers]
display_categories: [research-notes]

scholar:
  last_name: [Ji]
  first_name: [Chao Peng, Chao, C. P.]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_link: Details
  query: "@*"
  group_by: year
  group_order: descending

enable_publication_badges:
  altmetric: false
  dimensions: false
  google_scholar: false
  inspirehep: false
filtered_bibtex_keywords: [abbr, abstract, additional_info, altmetric, annotation, arxiv, award, award_name, bibtex_show, blog, code, dimensions, eprint, google_scholar_id, hal, html, inspirehep_id, pdf, pmid, poster, preview, selected, slides, supp, video, website]
max_author_limit: 3
more_authors_animation_delay: 10
enable_publication_thumbnails: false

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:
imagemagick:
  enabled: false
  widths: [480, 800, 1400]
  input_directories: [assets/img/]
  input_formats: [.jpg, .jpeg, .png, .tiff, .gif]
  output_formats:
    webp: "-auto-orient -quality 85"
lazy_loading_images: true

enable_google_verification: false
enable_bing_verification: false
enable_cookie_consent: false
enable_masonry: true
enable_math: true
enable_tooltips: false
enable_darkmode: true
enable_navbar_social: false
enable_project_categories: true
enable_medium_zoom: true
enable_progressbar: true
enable_video_embedding: false

third_party_libraries:
  download: false
  fontawesome:
    url:
      css: https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css
    version: "7.2.0"
  academicons:
    url:
      css: https://cdn.jsdelivr.net/npm/academicons@1.9.5/css/academicons.min.css
    version: "1.9.5"
  google_fonts:
    url:
      fonts: "https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:100,300,400,500,700|Material+Icons&display=swap"
  jquery:
    url:
      js: https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js
    version: "3.6.0"
  masonry:
    url:
      js: https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js
    version: "4.2.2"
  imagesloaded:
    url:
      js: https://cdn.jsdelivr.net/npm/imagesloaded@5.0.0/imagesloaded.pkgd.min.js
    version: "5.0.0"
  mathjax:
    url:
      js: https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js
      fonts: https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/output/chtml/fonts/woff-v2/
    version: "3.2.2"
  tocbot:
    url:
      css: https://cdn.jsdelivr.net/npm/tocbot@4.36.4/dist/tocbot.css
      js: https://cdn.jsdelivr.net/npm/tocbot@4.36.4/dist/tocbot.min.js
    version: "4.36.4"
  vanilla-back-to-top:
    url:
      js: https://cdn.jsdelivr.net/npm/vanilla-back-to-top@7.2.1/dist/vanilla-back-to-top.min.js
    version: "7.2.1"
  bootstrap-table:
    url:
      css: https://cdn.jsdelivr.net/npm/bootstrap-table@1.22.4/dist/bootstrap-table.min.css
      js: https://cdn.jsdelivr.net/npm/bootstrap-table@1.22.4/dist/bootstrap-table.min.js
    version: "1.22.4"

jekyll_get_json: []
jsonresume: [basics, work, education, publications, projects, volunteer, awards, certificates, skills, languages, interests, references]
