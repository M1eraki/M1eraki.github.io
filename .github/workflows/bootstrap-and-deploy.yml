name: Bootstrap and deploy al-folio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: homepage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap al-folio source
        shell: bash
        run: |
          set -euo pipefail
          if [ -f _config.yml ]; then
            echo "al-folio source already exists; skipping bootstrap."
            exit 0
          fi

          tmpdir="$(mktemp -d)"
          cp .github/workflows/bootstrap-and-deploy.yml "$tmpdir/bootstrap-and-deploy.yml"
          git clone --depth 1 https://github.com/alshedivat/al-folio.git "$tmpdir/al-folio"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$tmpdir/al-folio"/. .
          rm -rf .git .github/workflows
          mkdir -p .github/workflows
          cp "$tmpdir/bootstrap-and-deploy.yml" .github/workflows/bootstrap-and-deploy.yml

          rm -rf _news/* _posts/* _projects/* _books _teachings
          rm -f _pages/about.md _pages/blog.md _pages/books.md _pages/cv.md _pages/dropdown.md _pages/news.md _pages/profiles.md _pages/projects.md _pages/publications.md _pages/repositories.md _pages/teaching.md
          rm -f assets/img/* assets/pdf/*
          mkdir -p _bibliography _data _news _pages _posts _projects assets/img assets/pdf assets/rendercv

          ruby <<'RUBY'
          path = "_config.yml"
          s = File.read(path)
          edits = {
            /^title:.*$/ => "title: Chao Peng Ji",
            /^first_name:.*$/ => "first_name: Chao Peng",
            /^middle_name:.*$/ => "middle_name:",
            /^last_name:.*$/ => "last_name: Ji",
            /^keywords:.*$/ => "keywords: academic-website, researcher, publications, projects, cv",
            /^lang:.*$/ => "lang: en",
            /^icon:.*$/ => "icon:",
            /^url:.*$/ => "url: https://M1eraki.github.io",
            /^baseurl:.*$/ => "baseurl:",
            /^search_enabled:.*$/ => "search_enabled: true",
            /^bib_search:.*$/ => "bib_search: true",
            /^enable_masonry:.*$/ => "enable_masonry: true",
            /^enable_darkmode:.*$/ => "enable_darkmode: true",
            /^enable_navbar_social:.*$/ => "enable_navbar_social: false",
            /^enable_project_categories:.*$/ => "enable_project_categories: true",
            /^enable_publication_thumbnails:.*$/ => "enable_publication_thumbnails: false"
          }
          edits.each { |pattern, value| s.gsub!(pattern, value) }
          s.gsub!(/^  github_readme_stats_url:.*$/, "  github_readme_stats_url: https://github-readme-stats.vercel.app")
          s.gsub!(/^  github_profile_trophy_url:.*$/, "  github_profile_trophy_url: https://github-profile-trophy.vercel.app")
          s.gsub!(/contact_note: >\n(?:  .*\n)+?description:/, "contact_note: >\n  Email is the best way to reach me. Please update this note with your preferred contact route.\ndescription:")
          s.gsub!(/description: >.*?footer_text:/m, "description: >\n  Personal academic homepage for Chao Peng Ji: research, publications, projects, notes, and CV.\nfooter_text:")
          s.gsub!(/footer_text: >.*?keywords:/m, "footer_text: >\n  Built with <a href=\"https://github.com/alshedivat/al-folio\">al-folio</a> and hosted on <a href=\"https://pages.github.com/\" target=\"_blank\">GitHub Pages</a>.\nkeywords:")
          File.write(path, s)
          RUBY

          cat > README.md <<'EOF'
          # Chao Peng Ji Academic Homepage

          This repository contains an al-folio academic homepage starter prepared for Chao Peng Ji.

          It is based on [al-folio](https://github.com/alshedivat/al-folio), a clean and responsive Jekyll theme for academics.

          ## What To Edit First

          - `_config.yml`: site name, URL, description, search, and theme settings.
          - `_pages/about.md`: homepage bio and profile block.
          - `_data/socials.yml`: email, GitHub, Google Scholar, ORCID, LinkedIn, and RSS.
          - `_bibliography/papers.bib`: publication list.
          - `_projects/`: selected project pages.
          - `_data/cv.yml`: CV content.
          EOF

          cat > PERSONALIZE.md <<'EOF'
          # Personalize This Homepage

          This is a clean al-folio starter for Chao Peng Ji's academic homepage.

          - Update `_config.yml` with your exact name, affiliation, keywords, and contact note.
          - Add email, Google Scholar, ORCID, LinkedIn, and other links in `_data/socials.yml`.
          - Replace `_pages/about.md` with your real affiliation and short bio.
          - Add a real profile photo as `assets/img/prof_pic.jpg`, then set `profile.image: prof_pic.jpg` in `_pages/about.md`.
          - Add publication BibTeX entries to `_bibliography/papers.bib`.
          - Replace the starter project pages in `_projects/` with real projects.
          - Update `_data/cv.yml` with your education, experience, awards, skills, and publications.
          EOF

          cat > _pages/about.md <<'EOF'
          ---
          layout: about
          title: about
          permalink: /
          subtitle: Researcher working at the intersection of artificial intelligence, scientific discovery, and reproducible research tools.

          profile:
            align: right
            image:
            image_circular: false
            more_info: >
              <p>Researcher</p>
              <p>Add affiliation and location</p>

          selected_papers: false
          social: true

          announcements:
            enabled: true
            scrollable: true
            limit: 5

          latest_posts:
            enabled: true
            scrollable: true
            limit: 3
          ---

          I am a researcher interested in how computational methods can help us ask better scientific questions, build more reliable workflows, and turn complex data into useful evidence.

          My work sits around three themes:

          - **AI for science**: using machine learning, language models, and data systems to support discovery.
          - **Reproducible research**: building workflows that make analysis easier to inspect, rerun, and extend.
          - **Scientific communication**: turning technical results into clear papers, figures, talks, and tools.

          This website collects my publications, selected projects, research notes, and CV. The current version is a clean starting point; the next step is to add my real affiliation, profile photo, publication BibTeX, and project details.
          EOF

          cat > _pages/publications.md <<'EOF'
          ---
          layout: page
          permalink: /publications/
          title: publications
          description: selected papers, manuscripts, and preprints.
          nav: true
          nav_order: 2
          ---

          This page is ready for a BibTeX-based publication list. Add entries to `_bibliography/papers.bib`; al-folio will group them by year and render the bibliography automatically.

          {% include bib_search.liquid %}

          <div class="publications">
          {% bibliography %}
          </div>
          EOF

          cat > _pages/projects.md <<'EOF'
          ---
          layout: page
          title: projects
          permalink: /projects/
          description: selected research projects, tools, and reproducible workflows.
          nav: true
          nav_order: 3
          display_categories: [research, tools]
          horizontal: false
          ---

          <div class="projects">
          {% if site.enable_project_categories and page.display_categories %}
            {% for category in page.display_categories %}
            <a id="{{ category }}" href=".#{{ category }}"><h2 class="category">{{ category }}</h2></a>
            {% assign categorized_projects = site.projects | where: "category", category %}
            {% assign sorted_projects = categorized_projects | sort: "importance" %}
            <div class="row row-cols-1 row-cols-md-3">
              {% for project in sorted_projects %}
                {% include projects.liquid %}
              {% endfor %}
            </div>
            {% endfor %}
          {% endif %}
          </div>
          EOF

          cat > _pages/cv.md <<'EOF'
          ---
          layout: cv
          permalink: /cv/
          title: CV
          nav: true
          nav_order: 5
          cv_pdf:
          cv_format: rendercv
          description: academic CV.
          toc:
            sidebar: left
          ---
          EOF

          cat > _pages/news.md <<'EOF'
          ---
          layout: page
          title: news
          permalink: /news/
          ---

          {% include news.liquid %}
          EOF

          cat > _pages/blog.md <<'EOF'
          ---
          layout: page
          title: notes
          permalink: /blog/
          nav: true
          nav_order: 4
          pagination:
            enabled: true
          ---

          <div class="post">
            <header class="post-header">
              <h1 class="post-title">{{ site.blog_name }}</h1>
              <p class="post-description">{{ site.blog_description }}</p>
            </header>

            <ul class="post-list">
              {% if page.pagination.enabled %}
                {% assign postlist = paginator.posts %}
              {% else %}
                {% assign postlist = site.posts %}
              {% endif %}

              {% for post in postlist %}
              <li>
                <h3><a class="post-title" href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
                <p>{{ post.description }}</p>
                <p class="post-meta">{{ post.date | date: '%B %d, %Y' }}</p>
              </li>
              {% endfor %}
            </ul>

            {% if page.pagination.enabled %}
            {% include pagination.liquid %}
            {% endif %}
          </div>
          EOF

          cat > _bibliography/papers.bib <<'EOF'
          ---
          ---

          % Add your publication BibTeX entries below.
          EOF

          cat > _data/socials.yml <<'EOF'
          email:
          github_username: M1eraki
          scholar_userid:
          orcid_id:
          linkedin_username:
          rss_icon: true
          EOF

          cat > _data/repositories.yml <<'EOF'
          github_users:
            - M1eraki

          repo_description_lines_max: 2
          github_repos: []
          EOF

          cat > _data/cv.yml <<'EOF'
          cv:
            name: Chao Peng Ji
            location: Add location
            email:
            social_networks:
              - network: GitHub
                username: M1eraki
            sections:
              education:
                - institution: Add institution
                  area: Add field
                  degree: Add degree
                  start_date:
                  end_date:
                  highlights:
                    - Add thesis, supervisor, or honors.
              research_interests:
                - label: Interests
                  details: AI for science; reproducible workflows; scientific communication.
              experience:
                - company: Add affiliation
                  position: Researcher
                  start_date:
                  end_date:
                  highlights:
                    - Add role, project, or achievement.
              publications:
                - title: Add publications in `_bibliography/papers.bib`
                  authors: Chao Peng Ji
                  journal: Add venue
                  date:
          EOF

          cat > _data/citations.yml <<'EOF'
          metadata: {}
          papers: {}
          EOF
          printf '{}\n' > _data/coauthors.yml
          printf '{}\n' > _data/venues.yml

          cat > _news/site-launched.md <<'EOF'
          ---
          layout: post
          date: 2026-07-02 00:00:00-0000
          inline: true
          related_posts: false
          ---

          This academic homepage was created with al-folio and is ready for personalization.
          EOF

          cat > _posts/2026-07-02-welcome.md <<'EOF'
          ---
          layout: post
          title: Welcome
          date: 2026-07-02 00:00:00
          description: A short note to start the research notes section.
          tags: research notes
          categories: research-notes
          related_posts: false
          ---

          This notes section is a place for short research updates, reading notes, technical walkthroughs, and reflections on scientific workflows.
          EOF

          cat > _projects/research-agenda.md <<'EOF'
          ---
          layout: page
          title: Research Agenda
          description: AI for science, reproducible workflows, and evidence-centered research.
          img:
          importance: 1
          category: research
          ---

          This project page is a place to describe the main intellectual thread of your research.
          EOF

          cat > _projects/publications-and-manuscripts.md <<'EOF'
          ---
          layout: page
          title: Publications and Manuscripts
          description: Papers, preprints, and manuscripts in progress.
          img:
          importance: 2
          category: research
          related_publications: true
          ---

          Use this page for a narrative view of your publications and manuscripts.
          EOF

          cat > _projects/research-tools.md <<'EOF'
          ---
          layout: page
          title: Research Tools
          description: Reproducible workflows, scripts, and open-source utilities.
          img:
          importance: 1
          category: tools
          ---

          Use this page to highlight code, datasets, notebooks, pipelines, or small tools that make your research easier to reproduce.
          EOF

          cat > assets/rendercv/design.yaml <<'EOF'
          design:
            theme: classic
            page:
              size: a4
              show_footer: false
              show_top_note: false
          EOF

          cat > assets/rendercv/locale.yaml <<'EOF'
          locale:
            language: english
          EOF

          cat > assets/rendercv/settings.yaml <<'EOF'
          settings:
            render_command:
              design: ../assets/rendercv/design.yaml
              locale: ../assets/rendercv/locale.yaml
              typst_path: ../assets/rendercv/rendercv_output/NAME_IN_SNAKE_CASE_CV.typ
              pdf_path: ../assets/rendercv/rendercv_output/NAME_IN_SNAKE_CASE_CV.pdf
              markdown_path: ../assets/rendercv/rendercv_output/NAME_IN_SNAKE_CASE_CV.md
              html_path: ../assets/rendercv/rendercv_output/NAME_IN_SNAKE_CASE_CV.html
              png_path: ../assets/rendercv/rendercv_output/NAME_IN_SNAKE_CASE_CV.png
              dont_generate_markdown: true
              dont_generate_html: true
              dont_generate_typst: false
              dont_generate_pdf: false
              dont_generate_png: true
            bold_keywords: []
          EOF

          touch assets/img/.gitkeep assets/pdf/.gitkeep

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bootstrap academic homepage source"
          git push

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS deps
        run: npm ci

      - name: Install and build
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert
          export JEKYLL_ENV=production
          bundle exec jekyll build

      - name: Purge unused CSS
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
